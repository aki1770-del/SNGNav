# CI — SNGNav Snow Scene
#
# Runs on every push and pull request:
#   1. flutter analyze (zero issues required)
#   2. flutter test    (all tests must pass)
#   3. flutter build linux --release (build must succeed)
#
# Probe tests (tagged 'probe') are excluded — they require
# live network access to external APIs.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve dependencies
        run: |
          flutter pub get
          for pkg in packages/*/; do
            (cd "$pkg" && flutter pub get)
          done

      - name: Analyze
        run: flutter analyze --no-fatal-infos

  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve dependencies
        run: |
          flutter pub get
          for pkg in packages/*/; do
            (cd "$pkg" && flutter pub get)
          done

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libblkid-dev \
            liblzma-dev \
            libsqlite3-dev

      - name: Run app tests
        run: flutter test --exclude-tags=probe

      - name: Run pure Dart package tests
        run: |
          for pkg in driving_conditions driving_consent driving_weather fleet_hazard kalman_dr routing_engine; do
            echo "--- packages/$pkg ---"
            (cd "packages/$pkg" && dart test)
          done

      - name: Run Flutter package tests
        run: |
          for pkg in map_viewport_bloc navigation_safety offline_tiles routing_bloc; do
            echo "--- packages/$pkg ---"
            (cd "packages/$pkg" && flutter test)
          done

  build:
    name: Build (Linux)
    runs-on: ubuntu-24.04
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve dependencies
        run: |
          flutter pub get
          for pkg in packages/*/; do
            (cd "$pkg" && flutter pub get)
          done

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libblkid-dev \
            liblzma-dev \
            libsqlite3-dev

      - name: Build release
        run: flutter build linux --release -t lib/snow_scene.dart
