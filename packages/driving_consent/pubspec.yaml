name: driving_consent
description: >-
  No consent? No data leaves the device. Privacy-first consent gate where
  UNKNOWN equals DENIED. Per-purpose consent, GDPR/CCPA/APPI-ready, with
  pluggable storage. Pure Dart, no Flutter dependency.
version: 0.3.0
repository: https://github.com/aki1770-del/sngnav
issue_tracker: https://github.com/aki1770-del/sngnav/issues
topics:
  - consent
  - privacy
  - gdpr
  - automotive
  - navigation

environment:
  sdk: ^3.11.0

dependencies:
  equatable: ^2.0.7

dev_dependencies:
  test: ^1.25.0
  lints: ^5.1.1
