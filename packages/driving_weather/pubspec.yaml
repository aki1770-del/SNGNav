name: driving_weather
description: >-
  Know when road conditions turn dangerous. Real-time weather monitoring
  with snow, ice, and visibility hazard detection. Open-Meteo integration
  (free, no API key) with offline fallback. Pure Dart, no Flutter dependency.
version: 0.3.0
repository: https://github.com/aki1770-del/sngnav
issue_tracker: https://github.com/aki1770-del/sngnav/issues
topics:
  - weather
  - driving
  - navigation
  - safety
  - winter-driving

environment:
  sdk: ^3.11.0

dependencies:
  equatable: ^2.0.7
  http: ^1.3.0

dev_dependencies:
  test: ^1.25.0
  lints: ^5.1.1
  mocktail: ^1.0.4
