name: driving_weather
description: >-
  Weather condition model for driving applications — snow, ice, visibility,
  and hazardous conditions detection. Precipitation type/intensity, wind speed,
  ice risk, and temperature monitoring. Includes Open-Meteo integration with
  offline fallback. Pure Dart, no Flutter dependency.
version: 0.1.1
repository: https://github.com/aki1770-del/sngnav
issue_tracker: https://github.com/aki1770-del/sngnav/issues
topics:
  - weather
  - driving
  - navigation
  - safety
  - open-meteo

environment:
  sdk: ^3.11.0

dependencies:
  equatable: ^2.0.7
  http: ^1.3.0

dev_dependencies:
  test: ^1.25.0
  lints: ^5.1.1
  mocktail: ^1.0.4
