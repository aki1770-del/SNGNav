name: fleet_hazard
description: >-
  Fleet telemetry hazard model and geographic clustering for driver-assisting
  navigation. Road condition reports, hazard zones, and a pure Dart
  aggregation algorithm with pluggable providers. No Flutter dependency.
version: 0.3.0
repository: https://github.com/aki1770-del/sngnav
issue_tracker: https://github.com/aki1770-del/sngnav/issues
topics:
  - fleet
  - hazard
  - automotive
  - navigation
  - snow

environment:
  sdk: ^3.11.0

dependencies:
  equatable: ^2.0.7
  latlong2: ^0.9.1

dev_dependencies:
  test: ^1.25.0
  lints: ^5.1.1