name: fleet_hazard
description: >-
  Turn scattered vehicle reports into map-ready hazard zones. Geographic
  clustering for snow and ice reports with severity aggregation. Pure Dart,
  pluggable providers, no Flutter dependency.
version: 0.3.0
repository: https://github.com/aki1770-del/sngnav
issue_tracker: https://github.com/aki1770-del/sngnav/issues
topics:
  - fleet
  - hazard
  - automotive
  - navigation
  - winter-driving

environment:
  sdk: ^3.11.0

dependencies:
  equatable: ^2.0.7
  latlong2: ^0.9.1

dev_dependencies:
  test: ^1.25.0
  lints: ^5.1.1