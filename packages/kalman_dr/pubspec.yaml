name: kalman_dr
description: >-
  Keep your app's position alive when GPS drops out. 4D Extended Kalman
  Filter for dead reckoning through tunnels, urban canyons, and parking
  garages. Use alongside geolocator. Pure Dart, no native dependencies.
version: 0.3.0
repository: https://github.com/aki1770-del/sngnav
issue_tracker: https://github.com/aki1770-del/sngnav/issues
topics:
  - kalman-filter
  - dead-reckoning
  - gps
  - navigation
  - positioning

environment:
  sdk: ^3.11.0

dependencies:
  equatable: ^2.0.7

dev_dependencies:
  test: ^1.25.0
  lints: ^5.1.1
