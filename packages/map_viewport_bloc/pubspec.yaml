name: map_viewport_bloc
description: >-
  Camera follow, free look, route overview — without reinventing viewport
  logic. Declarative state machine for navigation map cameras and six-layer
  composition. Bring your own renderer.
version: 0.3.0
repository: https://github.com/aki1770-del/sngnav
issue_tracker: https://github.com/aki1770-del/sngnav/issues
topics:
  - map
  - bloc
  - navigation
  - flutter
  - automotive

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  equatable: ^2.0.7
  flutter_bloc: ^9.1.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true