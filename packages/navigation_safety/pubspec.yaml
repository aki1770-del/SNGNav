name: navigation_safety
description: >-
  Show drivers what matters before it's too late. Safety alert overlay
  that stays on top of your navigation UI. Navigation session state machine
  with configurable severity thresholds. Display-only, never controlling.
version: 0.4.0
repository: https://github.com/aki1770-del/sngnav
issue_tracker: https://github.com/aki1770-del/sngnav/issues
topics:
  - safety
  - navigation
  - winter-driving
  - automotive
  - snow

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  equatable: ^2.0.7
  flutter_bloc: ^9.1.0
  routing_engine: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  latlong2: ^0.9.1

flutter:
  uses-material-design: true