name: navigation_safety_core
description: >-
  Pure Dart core models for navigation safety: alert severity, safety
  score, threshold config, navigation route, and safety scenario
  identifiers. No Flutter dependency. Consumed by navigation_safety
  (the full Flutter + BLoC package) and any other pure-Dart consumer
  that needs the safety vocabulary without paying for the Flutter
  rendering surface.
version: 0.1.0
repository: https://github.com/aki1770-del/sngnav
issue_tracker: https://github.com/aki1770-del/sngnav/issues
topics:
  - navigation
  - safety
  - automotive
  - winter-driving

environment:
  sdk: ^3.11.0

dependencies:
  equatable: ^2.0.7
  latlong2: ^0.9.1

dev_dependencies:
  test: ^1.25.0
  lints: ^5.1.1
