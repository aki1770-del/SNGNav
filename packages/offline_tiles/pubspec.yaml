name: offline_tiles
description: >-
  Keep your map rendering when the network drops. MBTiles-backed offline
  tile management for Flutter maps. Pre-cache routes and regions, resolve
  tiles locally when offline. Works with flutter_map.
version: 0.4.0
repository: https://github.com/aki1770-del/sngnav
issue_tracker: https://github.com/aki1770-del/sngnav/issues
topics:
  - offline
  - mbtiles
  - flutter-map
  - navigation
  - automotive

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  mbtiles: ^0.5.0
  path_provider: ^2.1.5
  sqlite3: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
