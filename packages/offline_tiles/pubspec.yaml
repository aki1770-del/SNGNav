name: offline_tiles
description: >-
  Offline tile management for Flutter navigation maps with MBTiles-backed local
  fallback. Includes coverage tiers, runtime tile resolution, and a Flutter
  tile provider with pure Dart _core models.
version: 0.2.0
repository: https://github.com/aki1770-del/sngnav
issue_tracker: https://github.com/aki1770-del/sngnav/issues
topics:
  - offline
  - mbtiles
  - flutter-map
  - navigation
  - automotive

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^8.2.2
  flutter_map_mbtiles: ^1.0.0
  latlong2: ^0.9.1
  mbtiles: ^0.4.2
  path_provider: ^2.1.5
  sqflite: ^2.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
