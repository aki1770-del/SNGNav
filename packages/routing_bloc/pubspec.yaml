name: routing_bloc
description: >-
  Route lifecycle in four states: idle, loading, active, error. Clean state
  machine for route requests with a glanceable progress UI. Works with any
  routing backend via routing_engine.
version: 0.3.0
repository: https://github.com/aki1770-del/sngnav
issue_tracker: https://github.com/aki1770-del/sngnav/issues
topics:
  - routing
  - bloc
  - navigation
  - flutter
  - automotive

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  equatable: ^2.0.7
  flutter_bloc: ^9.1.0
  latlong2: ^0.9.1
  navigation_safety:
    path: ../navigation_safety
  routing_engine: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true