name: routing_engine
description: >-
  Engine-agnostic routing interface with OSRM and Valhalla implementations.
  Supports local and public routing servers, offline routing via local Valhalla.
  Abstract RoutingEngine, RouteResult model, and build-time engine selection.
version: 0.3.0
repository: https://github.com/aki1770-del/sngnav
issue_tracker: https://github.com/aki1770-del/sngnav/issues
topics:
  - routing
  - osrm
  - valhalla
  - navigation
  - offline

environment:
  sdk: ^3.11.0

dependencies:
  equatable: ^2.0.7
  http: ^1.3.0
  latlong2: ^0.9.1

dev_dependencies:
  test: ^1.25.0
  lints: ^5.1.1
  mocktail: ^1.0.4
