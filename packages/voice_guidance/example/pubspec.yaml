name: voice_guidance_example
publish_to: 'none'

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  voice_guidance:
    path: ../
  navigation_safety: ^0.5.0
  routing_engine: ^0.3.0
  latlong2: ^0.9.1
  flutter_bloc: ^9.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

# Monorepo development: resolve sibling package locally; published
# releases resolve against pub.dev via the caret constraint above.
dependency_overrides:
  navigation_safety:
    path: ../../navigation_safety

flutter:
  uses-material-design: true
