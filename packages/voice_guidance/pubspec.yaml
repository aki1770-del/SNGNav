name: voice_guidance
description: >-
  "300 meters ahead, turn right." Platform-agnostic voice guidance for
  navigation apps. Works on mobile (flutter_tts), Linux (spd-say), and
  silently in CI. Pluggable TTS engine interface.
version: 0.3.0
repository: https://github.com/aki1770-del/sngnav
issue_tracker: https://github.com/aki1770-del/sngnav/issues
topics:
  - tts
  - voice
  - navigation
  - accessibility
  - flutter

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  equatable: ^2.0.7
  flutter_tts: ^4.2.2
  flutter_bloc: ^9.1.0
  navigation_safety: ^0.3.0
  routing_engine: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  latlong2: ^0.9.1

flutter:
  uses-material-design: true
