name: voice_guidance
description: >-
  Engine-agnostic voice guidance foundation for turn announcements and
  safety warnings. Provides TTS abstraction, FlutterTts implementation,
  and NoOp fallback for tests and headless environments.
version: 0.3.0
repository: https://github.com/aki1770-del/sngnav
issue_tracker: https://github.com/aki1770-del/sngnav/issues
topics:
  - tts
  - voice
  - navigation
  - accessibility
  - flutter

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  equatable: ^2.0.7
  flutter_tts: ^4.2.2
  flutter_bloc: ^9.1.0
  navigation_safety: ^0.3.0
  routing_engine: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  latlong2: ^0.9.1

flutter:
  uses-material-design: true
