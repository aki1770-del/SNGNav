name: sngnav_snow_scene
description: >
  Offline-first Flutter navigation with dead reckoning, weather safety,
  and configurable providers.
publish_to: 'none'
version: 0.3.1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  kalman_dr:
    path: packages/kalman_dr
  routing_engine:
    path: packages/routing_engine
  flutter_map: ^8.2.2
  flutter_map_mbtiles: ^1.0.0
  latlong2: ^0.9.1
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  dbus: ^0.7.10
  http: ^1.3.0
  sqlite3: ^2.9.4
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
