name: sngnav_snow_scene
description: >
  Offline-first Flutter navigation with dead reckoning, weather safety,
  and configurable providers.
publish_to: 'none'
version: 0.4.0

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  kalman_dr:
    path: packages/kalman_dr
  driving_weather:
    path: packages/driving_weather
  driving_consent:
    path: packages/driving_consent
  routing_engine:
    path: packages/routing_engine
  routing_bloc:
    ^0.2.0
  offline_tiles:
    ^0.2.0
  fleet_hazard:
    path: packages/fleet_hazard
  navigation_safety:
    ^0.2.0
  map_viewport_bloc:
    ^0.2.0
  driving_conditions:
    path: packages/driving_conditions
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  dbus: ^0.7.10
  http: ^1.3.0
  sqlite3: ^2.9.4
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

dependency_overrides:
  routing_engine:
    path: packages/routing_engine
  driving_weather:
    path: packages/driving_weather
  driving_conditions:
    path: packages/driving_conditions
  driving_consent:
    path: packages/driving_consent
  fleet_hazard:
    path: packages/fleet_hazard
  navigation_safety:
    path: packages/navigation_safety
  map_viewport_bloc:
    path: packages/map_viewport_bloc
  routing_bloc:
    path: packages/routing_bloc
  offline_tiles:
    path: packages/offline_tiles
  kalman_dr:
    path: packages/kalman_dr

flutter:
  uses-material-design: true
